services:
  # --- Matrix Homeserver (Conduit) ---
  conduit:
    image: matrixconduit/matrix-conduit:latest
    container_name: varg-conduit
    restart: unless-stopped
    environment:
      CONDUIT_CONFIG: "/etc/conduit.toml"
    volumes:
      - conduit_data:/var/lib/matrix-conduit/
      - ./conduit/conduit.toml:/etc/conduit.toml:ro
    networks:
      - matrix

  # --- Web UI (Element Web) ---
  element:
    image: vectorim/element-web:latest
    container_name: varg-element
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json:ro
    depends_on:
      - conduit
    networks:
      - matrix

  # --- Varg Chat Agent ---
  agent:
    build:
      context: ../agent
      dockerfile: Dockerfile
    container_name: varg-agent
    restart: unless-stopped
    environment:
      MATRIX_HOMESERVER: "http://conduit:6167"
      MATRIX_USERNAME: "${MATRIX_USERNAME:-rose}"
      MATRIX_PASSWORD: "${MATRIX_PASSWORD:-RoseBot2077!}"
      AGENT_DISPLAY_NAME: "${AGENT_DISPLAY_NAME:-Rose}"
      AGENT_AUTO_JOIN: "${AGENT_AUTO_JOIN:-true}"
      VARG_LLM_PROVIDER: "${VARG_LLM_PROVIDER:-ollama}"
      VARG_LLM_MODEL: "${VARG_LLM_MODEL:-}"
      VARG_LLM_URL: "${VARG_LLM_URL:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      AGENT_SYSTEM_PROMPT: "${AGENT_SYSTEM_PROMPT:-}"
      MATRIX_ROOM_ID: "${MATRIX_ROOM_ID:-}"
      SANDBOX_URL: "http://sandbox:5001"
      # Nice-to-have: Weather, Smart Home
      OPENWEATHERMAP_API_KEY: "${OPENWEATHERMAP_API_KEY:-}"
      HASS_URL: "${HASS_URL:-}"
      HASS_TOKEN: "${HASS_TOKEN:-}"
      JSON_Q: '"'
      JSON_NL: "\n"
      JSON_CR: "\r"
      JSON_TAB: "\t"
      JSON_BS: "\\"
    volumes:
      - agent_data:/app/data
      - agent_tools:/app/src/tools
    depends_on:
      - conduit
    networks:
      - matrix

  # --- Speech-to-Text Sidecar ---
  stt:
    build:
      context: ../stt
      dockerfile: Dockerfile
    container_name: varg-stt
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      MATRIX_HOMESERVER: "http://conduit:6167"
      # Email
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      IMAP_HOST: "${IMAP_HOST:-}"
      IMAP_PORT: "${IMAP_PORT:-993}"
      IMAP_USERNAME: "${IMAP_USERNAME:-}"
      IMAP_PASSWORD: "${IMAP_PASSWORD:-}"
      # Calendar (CalDAV)
      CALDAV_URL: "${CALDAV_URL:-}"
      CALDAV_AUTH_HEADER: "${CALDAV_AUTH_HEADER:-}"
    depends_on:
      - conduit
    networks:
      - matrix

  # --- Sandbox Sidecar (Code Execution, Git, Varg Compiler) ---
  sandbox:
    build:
      context: ../sandbox
      dockerfile: Dockerfile
    container_name: varg-sandbox
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox_repos:/tmp/repos
    networks:
      - matrix

  # --- Reverse Proxy (Caddy) ---
  caddy:
    image: caddy:2-alpine
    container_name: varg-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-2077}:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - conduit
      - element
    networks:
      - matrix

volumes:
  conduit_data:
  agent_data:
  agent_tools:
  sandbox_repos:
  caddy_data:
  caddy_config:

networks:
  matrix:
    driver: bridge
