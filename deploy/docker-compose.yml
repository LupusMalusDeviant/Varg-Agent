version: '3.8'

services:
  # --- Matrix Homeserver (Conduit) ---
  conduit:
    image: matrixconduit/matrix-conduit:latest
    container_name: varg-conduit
    restart: unless-stopped
    environment:
      CONDUIT_SERVER_NAME: "${SERVER_NAME:-localhost}"
      CONDUIT_DATABASE_BACKEND: "rocksdb"
      CONDUIT_PORT: "6167"
      CONDUIT_MAX_REQUEST_SIZE: "20000000"
      CONDUIT_ALLOW_REGISTRATION: "true"
      CONDUIT_ALLOW_FEDERATION: "${ALLOW_FEDERATION:-false}"
      CONDUIT_TRUSTED_SERVERS: '["matrix.org"]'
      CONDUIT_ADDRESS: "0.0.0.0"
    volumes:
      - conduit_data:/var/lib/matrix-conduit/
    networks:
      - matrix
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6167/_matrix/client/versions"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --- Web UI (Element Web) ---
  element:
    image: vectorim/element-web:latest
    container_name: varg-element
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json:ro
    depends_on:
      conduit:
        condition: service_healthy
    networks:
      - matrix

  # --- Varg Chat Agent ---
  agent:
    build:
      context: ..
      dockerfile: deploy/agent/Dockerfile
    container_name: varg-agent
    restart: unless-stopped
    environment:
      MATRIX_HOMESERVER: "http://conduit:6167"
      MATRIX_USERNAME: "${MATRIX_USERNAME:-varg-agent}"
      MATRIX_PASSWORD: "${MATRIX_PASSWORD:-changeme}"
      AGENT_DISPLAY_NAME: "${AGENT_DISPLAY_NAME:-Varg Agent}"
      AGENT_AUTO_JOIN: "${AGENT_AUTO_JOIN:-true}"
      VARG_LLM_PROVIDER: "${VARG_LLM_PROVIDER:-ollama}"
      VARG_LLM_MODEL: "${VARG_LLM_MODEL:-}"
      VARG_LLM_URL: "${VARG_LLM_URL:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      AGENT_SYSTEM_PROMPT: "${AGENT_SYSTEM_PROMPT:-}"
    volumes:
      - agent_data:/app/data
      - agent_tools:/app/src/tools
    depends_on:
      conduit:
        condition: service_healthy
    networks:
      - matrix

  # --- Reverse Proxy (Caddy) ---
  caddy:
    image: caddy:2-alpine
    container_name: varg-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - conduit
      - element
    networks:
      - matrix

volumes:
  conduit_data:
  agent_data:
  agent_tools:
  caddy_data:
  caddy_config:

networks:
  matrix:
    driver: bridge
