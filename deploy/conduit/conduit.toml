# Conduit Matrix Homeserver Configuration
# This file is optional - environment variables in docker-compose.yml take precedence.
# Use this for fine-tuning beyond what env vars provide.

[global]
server_name = "matrix.lupusmalus.dev"
database_path = "/var/lib/matrix-conduit/"
database_backend = "rocksdb"
address = "0.0.0.0"
port = 6167
max_request_size = 20000000
allow_registration = true
allow_federation = false
trusted_servers = ["matrix.org"]
